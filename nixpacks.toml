[phases.setup]
nixPkgs = ["python311", "nodejs_20", "gcc"]

[phases.install]
cmds = [
    "python -m venv --copies /opt/venv",
    ". /opt/venv/bin/activate && python -m pip install --upgrade pip",
    ". /opt/venv/bin/activate && python -m pip install -r backend/requirements.txt",
    "cd frontend && npm install --legacy-peer-deps"
]

[phases.build]
cmds = [
    "cd frontend && npm run build"
]

[start]
cmd = ". /opt/venv/bin/activate && uvicorn backend.main:app --host 0.0.0.0 --port $PORT"

[variables]
NIXPACKS_PYTHON_VERSION = "3.11"
